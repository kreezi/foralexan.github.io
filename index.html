<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Сертификат лучшего брата 🏆</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1a0f0a;
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 50%, rgba(200, 150, 100, 0.05) 0%, transparent 70%);
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .style-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .style-btn {
            padding: 10px 24px;
            border: 2px solid rgba(255, 215, 150, 0.2);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 215, 150, 0.5);
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .style-btn:hover {
            border-color: rgba(255, 215, 150, 0.4);
            color: rgba(255, 215, 150, 0.8);
        }

        .style-btn.active {
            border-color: #ffd700;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .style-btn .emoji {
            margin-right: 6px;
        }

        .certificate-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 150, 0.05);
        }

        /* ===== СЕРТИФИКАТ — ТОЧНО КАК НА КАРТИНКЕ ===== */
        .certificate {
            position: relative;
            width: 100%;
            aspect-ratio: 1.414 / 1;
            background: linear-gradient(145deg, #faf5ee, #f0e8d8);
            border-radius: 16px;
            padding: 50px 55px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
            border: 8px double #c9a86a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Рамка внутри */
        .certificate::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 2px solid rgba(201, 168, 106, 0.3);
            border-radius: 8px;
            pointer-events: none;
        }

        /* Уголки */
        .certificate .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #c9a86a;
            border-style: solid;
            border-width: 0;
            opacity: 0.4;
            z-index: 1;
        }
        .certificate .corner.tl {
            top: 33px;
            left: 33px;
            border-top-width: 3px;
            border-left-width: 3px;
        }
        .certificate .corner.tr {
            top: 33px;
            right: 33px;
            border-top-width: 3px;
            border-right-width: 3px;
        }
        .certificate .corner.bl {
            bottom: 33px;
            left: 33px;
            border-bottom-width: 3px;
            border-left-width: 3px;
        }
        .certificate .corner.br {
            bottom: 33px;
            right: 33px;
            border-bottom-width: 3px;
            border-right-width: 3px;
        }

        /* ===== СОДЕРЖИМОЕ (ТОЧНО КАК НА КАРТИНКЕ) ===== */
        .certificate .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .certificate .title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #8a6a3a;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Georgia', serif;
        }

        .certificate .subtitle {
            font-size: 1rem;
            color: rgba(138, 106, 58, 0.5);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 2px;
            margin-bottom: 25px;
        }

        .certificate .main-text {
            font-size: 1.5rem;
            line-height: 1.9;
            color: #3d2a1a;
            font-style: italic;
            max-width: 85%;
        }

        .certificate .main-text .name {
            font-size: 2.6rem;
            color: #8a3a2a;
            font-style: normal;
            font-weight: 700;
            display: block;
            margin: 8px 0;
            letter-spacing: 4px;
        }

        .certificate .main-text .highlight {
            color: #c9a86a;
            font-style: normal;
            font-weight: 700;
        }

        .certificate .subtext {
            font-size: 1rem;
            color: rgba(61, 42, 26, 0.5);
            font-style: italic;
            margin-top: 16px;
            margin-bottom: 20px;
        }

        .certificate .signature {
            font-size: 1.3rem;
            color: #8a6a3a;
            font-style: italic;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .certificate .signature-line {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 4px;
        }
        .certificate .signature-line .line {
            width: 120px;
            height: 1px;
            background: rgba(138, 106, 58, 0.2);
        }

        /* ===== ПЕЧАТЬ КАК НА КАРТИНКЕ ===== */
        .stamp {
            position: absolute;
            bottom: 50px;
            right: 55px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #1a5ca8;
            background: rgba(26, 92, 168, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: rotate(-12deg);
            box-shadow: 0 0 20px rgba(26, 92, 168, 0.05);
            padding: 12px;
            text-align: center;
            line-height: 1.2;
            color: #1a5ca8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stamp .top-text {
            display: block;
            font-size: 0.4rem;
            letter-spacing: 1.5px;
        }
        .stamp .mid-text {
            display: block;
            font-size: 0.45rem;
            letter-spacing: 0.5px;
            font-weight: 800;
            margin: 1px 0;
        }
        .stamp .bottom-text {
            display: block;
            font-size: 0.5rem;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* ===== СПОРТИВНЫЙ СТИЛЬ ===== */
        .certificate.sport {
            background: linear-gradient(145deg, #1a2a1a, #0d1a0d);
            border-color: #ffd700;
        }
        .certificate.sport::before {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .certificate.sport .corner {
            border-color: #ffd700;
        }
        .certificate.sport .title {
            color: #ffd700;
        }
        .certificate.sport .subtitle {
            color: rgba(255, 215, 0, 0.4);
        }
        .certificate.sport .main-text {
            color: #f5e6d3;
        }
        .certificate.sport .main-text .name {
            color: #ffd700;
        }
        .certificate.sport .main-text .highlight {
            color: #ffd700;
        }
        .certificate.sport .subtext {
            color: rgba(245, 230, 211, 0.5);
        }
        .certificate.sport .signature {
            color: #ffd700;
        }
        .certificate.sport .signature-line .line {
            background: rgba(255, 215, 0, 0.2);
        }
        .certificate.sport .stamp {
            border-color: #ffd700;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.03);
        }

        /* ===== РОКЕРСКИЙ СТИЛЬ ===== */
        .certificate.rock {
            background: linear-gradient(145deg, #1a0a0a, #0d0505);
            border-color: #ff2255;
        }
        .certificate.rock::before {
            border-color: rgba(255, 34, 85, 0.2);
            border-style: dashed;
        }
        .certificate.rock .corner {
            border-color: #ff2255;
        }
        .certificate.rock .title {
            color: #ff2255;
        }
        .certificate.rock .subtitle {
            color: rgba(255, 34, 85, 0.4);
        }
        .certificate.rock .main-text {
            color: #f5e6d3;
        }
        .certificate.rock .main-text .name {
            color: #ff2255;
        }
        .certificate.rock .main-text .highlight {
            color: #ff2255;
        }
        .certificate.rock .subtext {
            color: rgba(245, 230, 211, 0.5);
        }
        .certificate.rock .signature {
            color: #ff2255;
        }
        .certificate.rock .signature-line .line {
            background: rgba(255, 34, 85, 0.2);
        }
        .certificate.rock .stamp {
            border-color: #ff2255;
            color: #ff2255;
            background: rgba(255, 34, 85, 0.03);
        }
        .certificate.rock .stamp .mid-text {
            color: #ff2255;
        }
        .certificate.rock .stamp .bottom-text {
            color: #ff2255;
        }

        /* ===== КНОПКИ ===== */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-download {
            padding: 14px 40px;
            background: linear-gradient(135deg, #c9a86a, #b8924a);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(201, 168, 106, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(201, 168, 106, 0.3);
        }

        .btn-download:active {
            transform: translateY(0) scale(0.97);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .certificate {
                padding: 30px 25px;
                aspect-ratio: auto;
                min-height: 480px;
            }
            .certificate .title {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
            .certificate .subtitle {
                font-size: 0.7rem;
                letter-spacing: 4px;
                margin-bottom: 15px;
            }
            .certificate .main-text {
                font-size: 1rem;
                max-width: 95%;
            }
            .certificate .main-text .name {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .certificate .subtext {
                font-size: 0.8rem;
                margin-top: 10px;
                margin-bottom: 14px;
            }
            .certificate .signature {
                font-size: 1rem;
            }
            .certificate .signature-line .line {
                width: 60px;
            }
            .stamp {
                width: 80px;
                height: 80px;
                bottom: 30px;
                right: 25px;
                padding: 8px;
            }
            .stamp .top-text {
                font-size: 0.3rem;
            }
            .stamp .mid-text {
                font-size: 0.35rem;
            }
            .stamp .bottom-text {
                font-size: 0.35rem;
            }
            .certificate .corner {
                width: 18px;
                height: 18px;
            }
            .certificate .corner.tl,
            .certificate .corner.tr {
                top: 20px;
            }
            .certificate .corner.bl,
            .certificate .corner.br {
                bottom: 20px;
            }
            .certificate .corner.tl,
            .certificate .corner.bl {
                left: 20px;
            }
            .certificate .corner.tr,
            .certificate .corner.br {
                right: 20px;
            }
            .certificate::before {
                top: 15px;
                left: 15px;
                right: 15px;
                bottom: 15px;
            }
            .style-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
            .btn-download {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .certificate {
                padding: 20px 16px;
                min-height: 400px;
            }
            .certificate .title {
                font-size: 1.4rem;
                letter-spacing: 2px;
            }
            .certificate .main-text {
                font-size: 0.85rem;
            }
            .certificate .main-text .name {
                font-size: 1.4rem;
            }
            .certificate .subtext {
                font-size: 0.7rem;
            }
            .certificate .signature {
                font-size: 0.85rem;
            }
            .certificate .signature-line .line {
                width: 40px;
            }
            .certificate .subtitle {
                font-size: 0.6rem;
                letter-spacing: 3px;
                margin-bottom: 10px;
            }
            .stamp {
                width: 65px;
                height: 65px;
                bottom: 20px;
                right: 16px;
                padding: 6px;
            }
            .stamp .top-text {
                font-size: 0.25rem;
            }
            .stamp .mid-text {
                font-size: 0.3rem;
            }
            .stamp .bottom-text {
                font-size: 0.3rem;
            }
            .certificate .corner {
                width: 14px;
                height: 14px;
            }
            .certificate .corner.tl,
            .certificate .corner.tr {
                top: 14px;
            }
            .certificate .corner.bl,
            .certificate .corner.br {
                bottom: 14px;
            }
            .certificate .corner.tl,
            .certificate .corner.bl {
                left: 14px;
            }
            .certificate .corner.tr,
            .certificate .corner.br {
                right: 14px;
            }
            .certificate::before {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="style-selector">
            <button class="style-btn active" data-style="classic">
                <span class="emoji">🏛️</span> Классический
            </button>
            <button class="style-btn" data-style="sport">
                <span class="emoji">⚽</span> Спортивный
            </button>
            <button class="style-btn" data-style="rock">
                <span class="emoji">🎸</span> Рокерский
            </button>
        </div>

        <div class="certificate-wrapper">
            <div class="certificate classic" id="certificate">

                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>

                <div class="content">
                    <div class="title">СЕРТИФИКАТ</div>
                    <div class="subtitle">— ОФИЦИАЛЬНОЕ ПРИЗНАНИЕ —</div>

                    <div class="main-text">
                        Настоящим подтверждается, что
                        <span class="name">Алексан Филатов</span>
                        — <span class="highlight">лучший муж, сын и брат!</span>
                    </div>

                    <div class="subtext">
                        За выдающиеся заслуги в создании уюта, тепла и радости в семье
                    </div>

                    <div class="signature-line">
                        <span class="line"></span>
                        <span class="signature">С любовью, твоя семья</span>
                        <span class="line"></span>
                    </div>
                </div>

                <!-- ===== ПЕЧАТЬ КРУГЛАЯ С ТЕКСТОМ ПО КРАЮ ===== -->
                <div class="stamp" id="stamp">
                    <span class="top-text">ЗАКРЫТОЕ</span>
                    <span class="mid-text">СЕМЕЙНОЕ</span>
                    <span class="bottom-text">ОБЩЕСТВО</span>
                    <span class="bottom-text" style="font-size:0.4rem; margin-top:1px;">"НАША СЕМЬЯ"</span>
                </div>

            </div>
        </div>

        <div class="actions">
            <button class="btn-download" id="downloadBtn">
                ⬇️ Скачать PDF
            </button>
        </div>

    </div>

    <script>
        (function() {
            // ===== ВЫБОР СТИЛЯ =====
            const styleBtns = document.querySelectorAll('.style-btn');
            const certificate = document.getElementById('certificate');

            styleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    styleBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const style = this.dataset.style;
                    certificate.className = 'certificate ' + style;
                });
            });

            // ===== СКАЧИВАНИЕ В PDF =====
            const downloadBtn = document.getElementById('downloadBtn');

            downloadBtn.addEventListener('click', function() {
                const originalText = this.innerHTML;
                this.innerHTML = '⏳ Генерация PDF...';
                this.disabled = true;

                const element = document.getElementById('certificate');

                // Формат A4: 595 x 842 pt (соотношение 1:1.414)
                // Используем landscape
                const opt = {
                    margin: 0,
                    filename: 'Сертификат_Алексан_Филатов.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: '#faf5ee',
                        logging: false,
                        width: element.scrollWidth,
                        height: element.scrollHeight,
                    },
                    jsPDF: {
                        unit: 'pt',
                        format: [842, 595], // A4 landscape
                        orientation: 'landscape'
                    }
                };

                html2pdf().set(opt).from(element).save().then(function() {
                    downloadBtn.innerHTML = '✅ Скачано!';
                    setTimeout(() => {
                        downloadBtn.innerHTML = originalText;
                        downloadBtn.disabled = false;
                    }, 2000);
                }).catch(function(err) {
                    console.error('Ошибка:', err);
                    downloadBtn.innerHTML = '❌ Ошибка, попробуйте снова';
                    downloadBtn.disabled = false;
                });
            });

            console.log('🏆 Сертификат для Алексана Филатова готов!');
        })();
    </script>

</body>
</html>
